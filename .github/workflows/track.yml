name: ktown4u-track

# 连续抓取:一个任务一直跑(每10秒抓),每 ~15 分钟由定时触发「取消并重启」一个
# 新任务来接力(GitHub 不支持真·永久任务,这是最接近连续的免费做法)。
# 也可在 Actions 页手动触发 workflow_dispatch。
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

# 关键:新任务一来就取消正在跑的旧任务,实现接力(空档约 30 秒)
concurrency:
  group: ktown4u-track
  cancel-in-progress: true

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 25      # 比 15 分钟大,等下一轮定时来接力;万一定时延迟也不会过早结束
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 配置 git 身份
        run: |
          git config user.name "ktown4u-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 连续抓取(每10秒)
        run: python ktown4u_ci.py
