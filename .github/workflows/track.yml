name: ktown4u-track

# 连续抓取:任务跑 ~50 分钟(每10秒抓),结束前用 PAT 自我触发下一个接力;
# schedule 仅作兜底(GitHub 定时不可靠,所以主要靠自我接力)。也可手动 workflow_dispatch。
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

# 新任务一来就取消正在跑的旧任务(接力),空档约 30 秒
concurrency:
  group: ktown4u-track
  cancel-in-progress: true

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 配置 git 身份
        run: |
          git config user.name "ktown4u-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 连续抓取(每10秒,结束前自我接力)
        env:
          PAT: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
          MND_PROXY: ${{ secrets.MND_PROXY }}
        run: python ktown4u_ci.py
